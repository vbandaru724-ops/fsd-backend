services:
  - type: web
    name: peerhub-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/peerhub-backend-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false   # set to your frontend URL, e.g. https://your-app.vercel.app
