# ── MySQL ──
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/peerhub_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Suchir@123}
